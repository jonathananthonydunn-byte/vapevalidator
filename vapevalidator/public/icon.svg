<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sky blue background -->
  <rect width="512" height="512" rx="100" fill="#5bbfff"/>
  <!-- Sun -->
  <circle cx="380" cy="110" r="52" fill="#ffe566"/>
  <circle cx="380" cy="110" r="38" fill="#fff8c0"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="140" rx="70" ry="30" fill="white" opacity="0.95"/>
  <ellipse cx="70" cy="125" rx="42" ry="32" fill="white"/>
  <ellipse cx="115" cy="118" rx="38" ry="28" fill="white"/>
  <ellipse cx="145" cy="130" rx="34" ry="25" fill="white" opacity="0.95"/>
  <!-- Smoke puff 1 -->
  <ellipse cx="200" cy="300" rx="55" ry="48" fill="white" opacity="0.7"/>
  <ellipse cx="230" cy="270" rx="48" ry="44" fill="white" opacity="0.65"/>
  <ellipse cx="260" cy="250" rx="42" ry="40" fill="white" opacity="0.6"/>
  <!-- Smoke puff 2 -->
  <ellipse cx="290" cy="290" rx="50" ry="44" fill="#e8d8ff" opacity="0.7"/>
  <ellipse cx="315" cy="265" rx="44" ry="40" fill="#d4b8ff" opacity="0.65"/>
  <!-- VV text -->
  <text x="256" y="460" font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
    text-anchor="middle" fill="#1a0a5e" opacity="0.9">VV</text>
  <!-- Ghost emoji style -->
  <text x="256" y="220" font-size="100" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">👻</text>
</svg>
